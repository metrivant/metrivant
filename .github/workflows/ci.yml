name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Type-check + build (runs on every push and PR) ──────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Backend — TypeScript check
        run: npm run typecheck

      - name: Setup Node (UI)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: radar-ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: radar-ui

      - name: UI — TypeScript check
        run: npx tsc --noEmit
        working-directory: radar-ui
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: UI — Build
        run: npm run build
        working-directory: radar-ui
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: https://metrivant.com

  # ── Database migrations (runs only on push to main, after build passes) ─────
  #
  # Applies all pending SQL migration files to Supabase automatically.
  # Each file is tracked in schema_migrations and applied exactly once.
  # No manual SQL editor work required for any migration.
  #
  # Required GitHub Secret:
  #   SUPABASE_URL           — https://<ref>.supabase.co  (Settings → API)
  #   SUPABASE_ACCESS_TOKEN  — personal access token from supabase.com/dashboard/account/tokens
  #
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
