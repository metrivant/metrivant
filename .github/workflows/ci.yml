name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Backend — TypeScript check
        run: npm run typecheck

      - name: Setup Node (UI)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: radar-ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: radar-ui

      - name: UI — TypeScript check
        run: npm run typecheck
        working-directory: radar-ui

      - name: UI — Build
        run: npm run build
        working-directory: radar-ui
