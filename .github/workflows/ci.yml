name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Type-check + build (runs on every push and PR) ──────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Backend — TypeScript check
        run: npm run typecheck

      - name: Setup Node 24 (UI)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: radar-ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: radar-ui

      - name: UI — TypeScript check
        run: npx tsc --noEmit
        working-directory: radar-ui
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: UI — Build
        run: npm run build
        working-directory: radar-ui
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: https://metrivant.com

  # ── Database migrations (runs only on push to main, after build passes) ─────
  #
  # Applies all pending SQL migration files to Supabase via a direct Postgres
  # connection. Each file is tracked in schema_migrations and applied exactly once.
  # No manual SQL editor work required — ever.
  #
  # Required GitHub Secret:
  #   SUPABASE_DB_URL — connection string from:
  #   Supabase dashboard → Settings → Database → Connection string → URI
  #   Format: postgresql://postgres:[password]@db.[ref].supabase.co:5432/postgres
  #
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate
        env:
          SUPABASE_DB_HOST:     aws-1-eu-west-3.pooler.supabase.com
          SUPABASE_DB_USER:     postgres.sponaiylvwzbnlmcfbzj
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
